<link rel="stylesheet" href="../../CSS/admin/coupons.css">
<div class="coupon-container">

    <div class="coupon-header">
        <h1>🎟️ Quản lý mã giảm giá</h1>

        <div class="coupon-form">
            <input id="code" placeholder="Nhập mã giảm giá...">
            <input id="discount" placeholder="% giảm">
            <button onclick="addCoupon()">+ Thêm</button>
        </div>
    </div>

    <table class="coupon-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Code</th>
                <th>Giảm</th>
                <th>Hành động</th>
            </tr>
        </thead>
        <tbody id="couponList"></tbody>
    </table>

</div>
