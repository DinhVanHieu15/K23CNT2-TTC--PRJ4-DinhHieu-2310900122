<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Học tập - Hệ thống LMS Cyber</title>

    <link rel="stylesheet" href="../../CSS/main.css">
    <link rel="stylesheet" href="../../CSS/learning.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* =======================================================
           PHẦN 1: CSS HEADER ĐỒNG BỘ (CÓ GIỎ HÀNG)
        ======================================================= */
        :root {
            --primary: #00d2ff;     /* Xanh Cyan */
            --secondary: #ff00cc;   /* Hồng Neon */
            --accent: #ff4d6d;      /* Đỏ hồng */
            --glass-border: rgba(255, 255, 255, 0.12);
        }

        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 8%; height: 80px;
            background: rgba(0, 0, 0, 0.85); 
            backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 9999;
            border-bottom: 1px solid var(--glass-border);
        }

        .logo {
            font-weight: 800; font-size: 26px; letter-spacing: 2px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase; cursor: pointer;
        }

        .menu { display: flex; gap: 30px; list-style: none; }
        .menu li {
            font-size: 15px; font-weight: 600; color: #fff;
            cursor: pointer; transition: 0.3s;
        }
        .menu li.active, .menu li:hover { color: var(--primary); }

        /* --- CSS GIỎ HÀNG TRÊN HEADER --- */
        .auth { display: flex; align-items: center; gap: 20px; }
        
        .cart-icon-wrapper {
            position: relative;
            cursor: pointer;
            font-size: 20px;
            color: #fff;
            transition: 0.3s;
        }
        .cart-icon-wrapper:hover { color: var(--primary); }
        
        .cart-badge {
            position: absolute;
            top: -8px;
            right: -10px;
            background: var(--secondary);
            color: white;
            font-size: 10px;
            font-weight: 800;
            padding: 2px 6px;
            border-radius: 50%;
            border: 2px solid #000;
            display: none;
        }

        .user-name { color: var(--primary); font-weight: bold; font-size: 15px; }
        .separator { color: rgba(255, 255, 255, 0.2); }

        .btn-logout-nav { 
            background: transparent; color: var(--accent); border: 1px solid var(--accent);
            padding: 7px 20px; border-radius: 12px; font-size: 13px; 
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-logout-nav:hover { background: var(--accent); color: white; }

        /* =======================================================
           PHẦN 2: GIỮ NGUYÊN CSS KHÓA HỌC CỦA TUẤN
        ======================================================= */
        .course-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            padding: 20px;
            transition: 0.3s;
            text-align: left;
        }

        .course-card:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.12);
            border-color: #ff00cc;
        }

        .course-card h4 { color: #ffffff; font-size: 1.1rem; margin: 15px 0 8px 0; line-height: 1.4; }
        .course-card .category-tag { color: #00d2ff; font-size: 0.85rem; font-weight: bold; text-transform: uppercase; }
        .course-card .price { display: block; margin-top: 15px; color: #2ecc71; font-weight: 800; font-size: 1.2rem; }
        .course-card img { width: 100%; border-radius: 10px; object-fit: cover; }
    </style>
</head>

<body>

<nav class="navbar">
    <div class="logo" onclick="location.href='index.html'">CODELEARN</div>
   <ul class="menu">
        <li onclick="location.href='index.html'">Trang chủ</li>
        <li onclick="location.href='learning.html'">Học tập</li>
        <li onclick="location.href='training.html'">Luyện tập</li> 
         <li onclick="location.href='order-history.html'">Lịch Sử Đơn Hàng</li>
        <li onclick="location.href='event.html'">Sự kiện</li>
        <li onclick="location.href='about.html'">Giới thiệu</li>
    </ul>
    <div class="auth" id="nav-auth"></div>
</nav>

<div class="banner">
    <h2>GIẢM GIÁ KHÓA HỌC</h2>
    <p>Ưu đãi lên tới 50% cho học viên mới</p>
</div>

<div class="filter">
    <div class="filter-wrapper">
        <input type="text" id="searchInput" placeholder="Tìm kiếm kỹ năng bạn muốn học..." onkeyup="filterCourses()">
        <button><i class="fas fa-search"></i></button>
    </div>
</div>

<div class="courses" id="course-list">
    <p style="text-align: center; width: 100%; color: #bdc3c7;">Đang tải danh sách khóa học...</p>
</div>

<script>
    const API_URL = 'http://127.0.0.1:5001/api';
    let allCourses = []; 

    // Cập nhật số lượng giỏ hàng
    function updateCartBadge() {
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        const badge = document.getElementById('cart-count');
        if (badge) {
            badge.innerText = cart.length;
            badge.style.display = cart.length > 0 ? 'block' : 'none';
        }
    }

    function checkAuth() {
        const userStr = localStorage.getItem('user');
        const navAuth = document.getElementById('nav-auth');

        if (userStr) {
            const user = JSON.parse(userStr);
            navAuth.innerHTML = `
                <div class="cart-icon-wrapper" onclick="location.href='cart.html'">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-badge" id="cart-count">0</span>
                </div>
                <span class="user-name">Chào, ${user.username}</span>
                <span class="separator">|</span>
                <button class="btn-logout-nav" onclick="handleLogout()">Đăng xuất</button>
            `;
            updateCartBadge();
        } else {
            navAuth.innerHTML = `<a href="../account/login.html" style="color: white; text-decoration: none; font-weight: 600; font-size: 14px;">Đăng nhập</a>`;
        }
    }

    function handleLogout() {
        localStorage.removeItem('user');
        window.location.reload();
    }

    async function fetchCourses() {
        try {
            const res = await fetch(`${API_URL}/courses`);
            const data = await res.json();
            
            if (data.status === "success") {
                allCourses = data.data; 
                renderCourses(allCourses);
            } else {
                document.getElementById('course-list').innerHTML = "<p style='color:white;'>Không có khóa học nào được xuất bản.</p>";
            }
        } catch (error) {
            console.error(error);
            document.getElementById('course-list').innerHTML = "<p style='color:#ff4757; text-align:center; width:100%;'>❌ Lỗi Server. Hãy bật app.py Tuấn nhé!</p>";
        }
    }

    function renderCourses(coursesData) {
        const container = document.getElementById('course-list');
        if(!container) return;
        container.innerHTML = ''; 

        if (coursesData.length === 0) {
            container.innerHTML = "<p style='text-align:center; width:100%; color: #ff4757;'>Không tìm thấy khóa học phù hợp.</p>";
            return;
        }

        coursesData.forEach(course => {
            const priceDisplay = course.price == 0 
                ? 'Miễn phí' 
                : `${Number(course.price).toLocaleString('vi-VN')} đ`;
            
            const imgUrl = `https://placehold.jp/24/34495e/ffffff/250x140.png?text=${encodeURIComponent(course.title)}`;

            container.innerHTML += `
                <div class="course-card">
                    <img src="${imgUrl}" alt="Course">
                    <div class="category-tag">${course.category}</div>
                    <h4>${course.title}</h4>
                    <span class="price">${priceDisplay}</span>
                    <button class="btn-enroll" onclick="location.href='course-detail.html?id=${course.id}'">Xem chi tiết</button>
                </div>
            `;
        });
    }

    function filterCourses() {
        const keyword = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allCourses.filter(course => 
            course.title.toLowerCase().includes(keyword) || 
            course.category.toLowerCase().includes(keyword)
        );
        renderCourses(filtered);
    }

    window.onload = () => {
        checkAuth();
        fetchCourses();
    };
</script>

</body>
</html>
